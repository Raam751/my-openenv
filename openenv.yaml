spec_version: 1
name: expense_audit_env
type: space
runtime: fastapi
app: server.app:app
port: 8000

description: |
  Real-world corporate expense report auditing (FinOps). 
  Agents verify receipts, enforce policy, detect fraud/duplicates, and approve/reject reports.
  Mirrors the exact daily workflow of finance teams at every company.

tasks:
  - id: easy
    name: Single clean report
    description: One employee report with 2 perfect receipts. Approve after verification.
    difficulty: easy
    has_grader: true
  - id: medium
    name: Minor policy violations
    description: Report with over-limit meal and one missing receipt. Partial approve + flag.
    difficulty: medium
    has_grader: true
  - id: hard
    name: Batch with fraud & duplicates
    description: 4 reports containing duplicates, personal spend, and currency issues. Prioritize and decide correctly.
    difficulty: hard
    has_grader: true

metadata:
  domain: finance
  tags: [openenv, finops, auditing, compliance, rpa]
  author: Ram Tichkule
